{% extends 'myapp/base.html' %}

{% block title %}Login{% endblock %}

{% block content %}
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    {% if form.errors %}
        <p style="color: rgb(0, 0, 0);">Invalid credentials.</p>
    {% endif %}
    <div class="auth-links">
        <a href="{% url 'home' %}">Back to Home</a>
    </div>
{% endblock %}
